<header class="layout-topbar">
  <!-- Logo -->
  <a class="layout-topbar-logo" routerLink="/">
    <div class="logo-icon-wrapper">
      <tui-icon icon="@tui.receipt" class="text-xl" />
    </div>
    <span>Ruru POS</span>
  </a>

  <!-- Sidebar toggle button -->
  <button
    tuiIconButton
    type="button"
    appearance="flat-grayscale"
    tuiHint="{{ collapsed() ? 'Expand sidebar' : 'Collapse sidebar' }}"
    tuiHintDirection="bottom"
    class="layout-menu-button"
    (click)="toggleMenu()"
  >
    <tui-icon icon="@tui.menu" />
  </button>

  <div class="layout-topbar-menu">
    <!-- Global search -->
    <tui-textfield tuiSize="m" class="layout-topbar-search">
      <tui-icon tuiTextfieldIcon icon="@tui.search" />
      <input tuiInput placeholder="Quick search… ⌘K" />
    </tui-textfield>

    <!-- Notifications -->
    <span class="relative inline-flex">
      <button
        tuiIconButton
        type="button"
        appearance="flat-grayscale"
      >
        <tui-icon icon="@tui.bell" />
      </button>
      <span
        tuiBadge
        size="s"
        appearance="destructive"
        class="absolute top-1 right-1 pointer-events-none"
      >
        3
      </span>
    </span>

    <!-- Theme Toggle -->
    <button
      tuiIconButton
      type="button"
      appearance="flat-grayscale"
      tuiHint="{{ themeService.isDarkMode() ? 'Switch to Light Mode' : 'Switch to Dark Mode' }}"
      tuiHintDirection="bottom"
      (click)="themeService.toggleTheme()"
    >
      <tui-icon [icon]="themeService.isDarkMode() ? '@tui.sun' : '@tui.moon'" />
    </button>

    <!-- User profile avatar button with dropdown -->
    <button
      tuiIconButton
      type="button"
      appearance="flat-grayscale"
      class="p-0 overflow-hidden"
      [tuiDropdown]="profileMenu"
      [(tuiDropdownOpen)]="open"
    >
      <span [tuiAvatar]="avatarLabel()" size="s"></span>
    </button>

    <ng-template #profileMenu>
      <div class="profile-dropdown">
        @if (currentUser(); as user) {
          <div class="user-dropdown-details">
            <span class="user-dropdown-name">{{ user.firstName }} {{ user.lastName }}</span>
            <span class="user-dropdown-role">{{ userRole() }}</span>
          </div>
          <hr class="dropdown-divider" />
        }
        <button
          tuiButton
          type="button"
          appearance="flat"
          size="s"
          (click)="signOut()"
          class="sign-out-btn"
        >
          Sign Out
        </button>
      </div>
    </ng-template>
  </div>
</header>
