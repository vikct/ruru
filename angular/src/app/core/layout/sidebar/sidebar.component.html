<div class="layout-sidebar" [class.layout-sidebar-collapsed]="collapsed()">
  <ul class="layout-menu">
    @for (item of navItems; track item.route) {
      <li>
        <a
          [routerLink]="item.route"
          routerLinkActive="active-route"
          [routerLinkActiveOptions]="{ exact: item.route === '/' }"
          class="layout-menuitem-root-action"
          [pTooltip]="collapsed() ? item.label : ''"
          tooltipPosition="right"
        >
          <i [class]="item.icon + ' layout-menuitem-icon'"></i>
          @if (!collapsed()) {
            <span class="layout-menuitem-text">{{ item.label }}</span>
          }
        </a>
      </li>
    }
  </ul>

  <!-- Sidebar Footer: Register status + User Profile -->
  <div class="sidebar-footer">
    <div class="user-profile" [pTooltip]="collapsed() ? 'Victor Tan (Administrator)' : ''" tooltipPosition="right">
      <p-avatar label="VT" shape="circle" styleClass="footer-avatar" />
      @if (!collapsed()) {
        <div class="user-details">
          <span class="user-name">Victor Tan</span>
          <span class="user-role">Administrator</span>
        </div>
      }
    </div>
    <div class="register-status" [pTooltip]="collapsed() ? 'Register Open · Shift 1' : ''" tooltipPosition="right">
      <span class="status-dot"></span>
      @if (!collapsed()) {
        <span class="status-text">Register Open · Shift 1</span>
      }
    </div>
  </div>
</div>
