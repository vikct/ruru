<div class="layout-root" [class.sidebar-collapsed]="collapsed()">

  <!-- ── Mobile overlay backdrop ─────────────────────────────── -->
  @if (isMobileOpen()) {
    <div class="mobile-backdrop" (click)="isMobileOpen.set(false)"></div>
  }

  <!-- Modular Sidebar Component -->
  <app-sidebar [(collapsed)]="collapsed" [(isMobileOpen)]="isMobileOpen" />

  <!-- ════════════════════════════════════════════════════════════
       MAIN COLUMN  (header + content)
  ═══════════════════════════════════════════════════════════════ -->
  <div class="main-column">

    <!-- Modular Header Component -->
    <app-header [(collapsed)]="collapsed" [(isMobileOpen)]="isMobileOpen" />

    <!-- Page content slot -->
    <main class="page-content">
      <ng-content></ng-content>
    </main>

  </div>

</div>
